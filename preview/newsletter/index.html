</style></head> <body data-astro-cid-d3b3fwfh> <div class="preview-notice" data-astro-cid-d3b3fwfh>

</span> <h1 style="font-size: 24px; font-weight: 800; color: #0f172a; margin: 16px 0 8px 0;" data-astro-cid-d3b3fwfh> The Pulse: Week of January 3 </h1> </td> </tr> <tr data-astro-cid-d3b3fwfh> <td style="padding: 40px;" data-astro-cid-d3b3fwfh>  </td> </tr> <div class="admin-bar" data-astro-cid-d3b3fwfh> <button id="send-test-btn" class="btn-primary" data-astro-cid-d3b3fwfh>Send Test to Inbox</button> <span id="status-msg" data-astro-cid-d3b3fwfh></span> </div>  <script>(function(){const subject = "Agentic Pulse | Week of 1/3/2026";

    const btn = document.getElementById('send-test-btn');
    const status = document.getElementById('status-msg');
    // 1. Get the email input element (Add this ID to an input in your HTML)
    const emailInput = document.getElementById('subscriber-email');
    
    btn.addEventListener('click', async () => {
        const recipient = emailInput?.value;

        if (!recipient) {
            status.innerText = 'Please enter an email address.';
            status.style.color = '#ef4444';
            return;
        }
        btn.disabled = true;
        status.innerText = 'Sending...';
        
        // Grabs the HTML from the specific email container we created
        const emailHtml = document.querySelector('[style*="background-color: #f8fafc"]').outerHTML;

        try {
            const res = await fetch('/api/send-test', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // 2. Pass the recipient email in the body
                body: JSON.stringify({ html: emailHtml, subject: subject, to: recipient })
            });

            const result = await res.json();

            if (res.ok) {
                status.innerText = 'Sent successfully!';
                status.style.color = '#10b981'; // Green
            } else {
                status.innerText = `Error: ${result.error || 'Failed to send'}`;
                status.style.color = '#ef4444'; // Red
            }
        } catch (err) {
            status.innerText = 'Network error occurred.';
            console.error(err);
        } finally {
            btn.disabled = false;
        }
    });
})();</script></table></div></body></html>
